<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Figurinhas da Copa</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .logo {
      opacity: 0;
      transform: translateY(-50px);
      animation: fadeInUp 2s forwards;
    }
    h1 {
      opacity: 0;
      animation: fadeIn 3s forwards;
      animation-delay: 1s;
      color: goldenrod;
    }
    .arrow {
      font-size: 40px;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 2s;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Logo Figurinhas da Copa" class="logo" width="200">
  <h1>Figurinhas da Copa</h1>
  <div class="arrow">
    <a href="login.html">⬇️</a>
  </div>
</body>
</html>
